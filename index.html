<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropolitan University - Login Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') center/cover no-repeat;
            opacity: 0.15;
            z-index: -1;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text h1 {
            font-size: 20px;
            color: #333;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 12px;
            color: #666;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .admin-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white !important;
            padding: 8px 20px;
            border-radius: 25px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .admin-btn::after {
            display: none;
        }

        .main-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            margin-top: 0;
            width: auto;
        }

        .tab-btn.active {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: none;
            box-shadow: none;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .uni-badge {
            text-align: center;
            margin-bottom: 25px;
        }

        .uni-badge .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .uni-badge h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .uni-badge p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.7;
            transform: none;
        }

        #otp_section {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            background: rgba(40, 167, 69, 0.9);
            color: white;
            backdrop-filter: blur(5px);
        }

        .error {
            background: rgba(220, 53, 69, 0.9);
            color: white;
            backdrop-filter: blur(5px);
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        /* Student Login Form */
        #studentLoginForm {
            display: block;
        }

        /* Admin Login Form */
        #adminLoginForm {
            display: none;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
            }
            .container {
                margin: 20px;
                padding: 30px 25px;
            }
            .uni-badge h2 {
                font-size: 24px;
            }
            .tab-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">MU</div>
            <div class="logo-text">
                <h1>Metropolitan University</h1>
                <p>Excel · Innovate · Lead</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="https://www.metrouni.edu.bd/sites/university/overview" target="_blank">About</a>
            <a href="https://www.metrouni.edu.bd/sites/programmes/honours-programmes" target="_blank">Academics</a>
            <a href="https://www.metrouni.edu.bd/sites/policies-regulations/student-code-of-conduct" target="_blank">Admission</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="container">
            <div class="uni-badge">
                <div class="icon">🎓</div>
                <h2>Login Portal</h2>
                <p>Access your academic portal</p>
            </div>

            <div class="login-tabs">
                <button class="tab-btn active" onclick="showStudentLogin()">🎓 Student Login</button>
                <button class="tab-btn" onclick="showAdminLogin()">👨‍💼 Admin Login</button>
            </div>

            <div id="studentLoginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your university email">
                </div>

                <button onclick="sendOTP()" id="sendBtn"> Send OTP</button>

                <div id="otp_section">
                    <div class="input-group">
                        <label>🔐 One Time Password (OTP)</label>
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP">
                    </div>
                    <button onclick="verifyOTP()"> Verify & Login</button>
                </div>
            </div>

            <!-- Admin Login Form -->
            <div id="adminLoginForm">
                <div class="input-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="admin_email" placeholder="admin@example.com">
                </div>

                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" id="admin_pass" placeholder="Enter your password">
                </div>

                <button onclick="adminLogin()" id="adminLoginBtn"> Login to Dashboard</button>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2003 Metropolitan University | All Rights Reserved | Developed by MU IT Department</p>
    </div>

    <script>
        function checkSession() {
            fetch("check_auth.php")
                .then(res => res.json())
                .then(data => {
                    if (data.student_logged_in || data.admin_logged_in) {
                        window.location.href = "/dashboard.html";
                    }
                })
                .catch(error => console.error("Error:", error));
        }

        function showStudentLogin() {
            document.getElementById("studentLoginForm").style.display = "block";
            document.getElementById("adminLoginForm").style.display = "none";
            document.querySelector(".tab-btn.active").classList.remove("active");
            event.target.classList.add("active");
            document.getElementById("message").innerHTML = "";
        }

        function showAdminLogin() {
            document.getElementById("studentLoginForm").style.display = "none";
            document.getElementById("adminLoginForm").style.display = "block";
            document.querySelector(".tab-btn.active").classList.remove("active");
            event.target.classList.add("active");
            document.getElementById("message").innerHTML = "";
        }
        function sendOTP() {
            let email = document.getElementById("email").value;
            let btn = document.getElementById("sendBtn");
            let msgDiv = document.getElementById("message");

            if (!email) {
                msgDiv.innerHTML = "<div class='error'> Please enter your email address</div>";
                return;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                msgDiv.innerHTML = "<div class='error'> Please enter a valid email address</div>";
                return;
            }

            btn.innerHTML = "Sending OTP...";
            btn.disabled = true;

            fetch("send_otp.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "email=" + encodeURIComponent(email)
            })
            .then(response => response.text())
            .then(data => {
                btn.innerHTML = " Send OTP";
                btn.disabled = false;

                if (data.length === 6 && !isNaN(data)) {
                    alert("🎓 Your OTP is: " + data + "\n\nPlease use this OTP to login.");
                    msgDiv.innerHTML = "<div class='success'> OTP generated successfully! Check the alert box.</div>";
                    document.getElementById("otp_section").style.display = "block";
                } else if (data === "success") {
                    msgDiv.innerHTML = "<div class='success'> OTP sent to your email! Please check your inbox.</div>";
                    document.getElementById("otp_section").style.display = "block";
                } else {
                    msgDiv.innerHTML = "<div class='error'> " + data + "</div>";
                }
            })
            .catch(error => {
                btn.innerHTML = " Send OTP";
                btn.disabled = false;
                msgDiv.innerHTML = "<div class='error'> Connection error. Please try again.</div>";
                console.error("Error:", error);
            });
        }

        function verifyOTP() {
            let email = document.getElementById("email").value;
            let otp = document.getElementById("otp").value;
            let msgDiv = document.getElementById("message");

            if (!otp) {
                msgDiv.innerHTML = "<div class='error'> Please enter the OTP</div>";
                return;
            }

            if (otp.length !== 6 || isNaN(otp)) {
                msgDiv.innerHTML = "<div class='error'> Please enter a valid 6-digit OTP</div>";
                return;
            }

            msgDiv.innerHTML = "<div class='success'> Verifying OTP...</div>";

            fetch("verify_otp.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "email=" + encodeURIComponent(email) + "&otp=" + encodeURIComponent(otp)
            })
            .then(response => response.text())
            .then(data => {
                if (data === "success") {
                    msgDiv.innerHTML = "<div class='success'> Login successful! Redirecting to dashboard...</div>";
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    msgDiv.innerHTML = "<div class='error'>✗ " + data + "</div>";
                }
            })
            .catch(error => {
                msgDiv.innerHTML = "<div class='error'>Verification failed. Please try again.</div>";
                console.error("Error:", error);
            });
        }

        
        function adminLogin() {
            let email = document.getElementById("admin_email").value;
            let password = document.getElementById("admin_pass").value;
            let btn = document.getElementById("adminLoginBtn");
            let msgDiv = document.getElementById("message");
            
            if (!email || !password) {
                msgDiv.innerHTML = "<div class='error'> Please enter both email and password</div>";
                return;
            }
            
            btn.innerHTML = "Authenticating...";
            btn.disabled = true;
            
            fetch("admin_login.php", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: "email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password)
            })
            .then(response => response.text())
            .then(data => {
                if (data === "success") {
                    msgDiv.innerHTML = "<div class='success'> Login successful! Redirecting...</div>";
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    msgDiv.innerHTML = "<div class='error'> Login failed: " + data + "</div>";
                    btn.innerHTML = " Login to Dashboard";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                msgDiv.innerHTML = "<div class='error'> Connection error. Please try again.</div>";
                btn.innerHTML = "Login to Dashboard";
                btn.disabled = false;
            });
        }
        document.getElementById("admin_pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                adminLogin();
            }
        });

        document.getElementById("otp").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                verifyOTP();
            }
        });

        checkSession();
    </script>
</body>

</html>
