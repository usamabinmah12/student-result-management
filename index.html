<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <script src="script.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        input, button { margin: 10px; padding: 8px; }
        button { cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #45a049; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        #otp_section { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Login</h2>
        
        <input type="email" id="email" placeholder="Email" style="width: 90%;">
        <br>
        <button onclick="sendOTP()">Send OTP</button>
        
        <div id="otp_section">
            <input type="text" id="otp" placeholder="Enter OTP" style="width: 90%;">
            <br>
            <button onclick="verifyOTP()">Login</button>
        </div>
    </div>
</body>
</html>
