<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropolitan University - Student Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
        }

        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') center/cover no-repeat;
            opacity: 0.2;
            z-index: -1;
        }

        
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text h1 {
            font-size: 20px;
            color: #333;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 12px;
            color: #666;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .admin-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white !important;
            padding: 8px 20px;
            border-radius: 25px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .admin-btn::after {
            display: none;
        }

        .main-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .uni-badge {
            text-align: center;
            margin-bottom: 25px;
        }

        .uni-badge .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .uni-badge h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .uni-badge p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.7;
            transform: none;
        }

        #otp_section {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            background: rgba(40, 167, 69, 0.9);
            color: white;
            backdrop-filter: blur(5px);
        }

        .error {
            background: rgba(220, 53, 69, 0.9);
            color: white;
            backdrop-filter: blur(5px);
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .nav-links {
                justify-content: center;
            }

            .container {
                margin: 20px;
                padding: 30px 25px;
            }

            .uni-badge h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">MU</div>
            <div class="logo-text">
                <h1>Metropolitan University</h1>
                <p>Excel · Innovate · Lead</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="#">About</a>
            <a href="#">Academics</a>
            <a href="#">Admission</a>
            <a href="admin.html" class="admin-btn">Admin Login</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="container">
            <div class="uni-badge">
                <div class="icon">🎓</div>
                <h2>Student Login</h2>
                <p>Access your academic portal</p>
            </div>

            <div class="input-group">
                <label> Email Address</label>
                <input type="email" id="email" placeholder="Enter your university email">
            </div>

            <button onclick="sendOTP()" id="sendBtn">Send OTP</button>

            <div id="otp_section">
                <div class="input-group">
                    <label>One Time Password (OTP)</label>
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP">
                </div>
                <button onclick="verifyOTP()"> Verify & Login</button>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2003 Metropolitan University | All Rights Reserved | Developed by USAMA-RUMA-NILA </p>
    </div>

    <script>
        function sendOTP() {
            let email = document.getElementById("email").value;
            let btn = document.getElementById("sendBtn");
            let msgDiv = document.getElementById("message");

            if (!email) {
                msgDiv.innerHTML = "<div class='error'> Please enter your email address</div>";
                return;
            }

            // Simple email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                msgDiv.innerHTML = "<div class='error'> Please enter a valid email address</div>";
                return;
            }

            btn.innerHTML = " Sending OTP...";
            btn.disabled = true;

            fetch("send_otp.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "email=" + encodeURIComponent(email)
            })
            .then(response => response.text())
            .then(data => {
                btn.innerHTML = " Send OTP";
                btn.disabled = false;

                if (data.length === 6 && !isNaN(data)) {
                    alert("🎓 Your OTP is: " + data + "\n\nPlease use this OTP to login.");
                    msgDiv.innerHTML = "<div class='success'>OTP generated successfully! Check the alert box.</div>";
                    document.getElementById("otp_section").style.display = "block";
                } else if (data === "success") {
                    msgDiv.innerHTML = "<div class='success'>OTP sent to your email! Please check your inbox.</div>";
                    document.getElementById("otp_section").style.display = "block";
                } else {
                    msgDiv.innerHTML = "<div class='error'>" + data + "</div>";
                }
            })
            .catch(error => {
                btn.innerHTML = " Send OTP";
                btn.disabled = false;
                msgDiv.innerHTML = "<div class='error'>Connection error. Please try again.</div>";
                console.error("Error:", error);
            });
        }

        function verifyOTP() {
            let email = document.getElementById("email").value;
            let otp = document.getElementById("otp").value;
            let msgDiv = document.getElementById("message");

            if (!otp) {
                msgDiv.innerHTML = "<div class='error'> Please enter the OTP</div>";
                return;
            }

            if (otp.length !== 6 || isNaN(otp)) {
                msgDiv.innerHTML = "<div class='error'> Please enter a valid 6-digit OTP</div>";
                return;
            }

            msgDiv.innerHTML = "<div class='success'>Verifying OTP...</div>";

            fetch("verify_otp.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "email=" + encodeURIComponent(email) + "&otp=" + encodeURIComponent(otp)
            })
            .then(response => response.text())
            .then(data => {
                if (data === "success") {
                    msgDiv.innerHTML = "<div class='success'>Login successful! Redirecting to dashboard...</div>";
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    msgDiv.innerHTML = "<div class='error'>" + data + "</div>";
                }
            })
            .catch(error => {
                msgDiv.innerHTML = "<div class='error'>Verification failed. Please try again.</div>";
                console.error("Error:", error);
            });
        }
    </script>
</body>

</html>
