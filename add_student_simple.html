<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { margin: 10px; padding: 8px; }
        button { background: green; color: white; border: none; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Add New Student</h2>
    <input type="text" id="id" placeholder="Student ID (e.g., 231-115-303)">
    <br>
    <input type="text" id="name" placeholder="Full Name">
    <br>
    <input type="email" id="email" placeholder="Email">
    <br>
    <input type="text" id="dept" placeholder="Department">
    <br>
    <button onclick="addStudent()">Add Student</button>
    <div id="message"></div>

    <script>
    function addStudent() {
        let id = document.getElementById("id").value;
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let dept = document.getElementById("dept").value;
        
        if(!id || !name || !email) {
            alert("Please fill all fields");
            return;
        }
        
        fetch("add_student.php", {
            method: "POST",
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `id=${id}&name=${name}&email=${email}&department=${dept}`
        })
        .then(res => res.text())
        .then(data => {
            if(data === "Added") {
                document.getElementById("message").innerHTML = "<p class='success'>✓ Student added successfully!</p>";
                document.getElementById("id").value = "";
                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("dept").value = "";
            } else {
                document.getElementById("message").innerHTML = "<p class='error'>✗ " + data + "</p>";
            }
        });
    }
    </script>
</body>
</html>
