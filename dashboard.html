<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropolitan University - Student Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            z-index: -1;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text h1 {
            font-size: 20px;
            color: #333;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 12px;
            color: #666;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .admin-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .main-container {
            padding: 30px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .search-section {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .admin-actions-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .admin-actions-title {
            font-weight: 600;
            color: #333;
        }

        .admin-actions-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .admin-action-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .admin-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .student-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .student-details h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .student-details p {
            opacity: 0.9;
            margin: 5px 0;
        }

        .student-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add-semester {
            background: linear-gradient(135deg, #17a2b8, #138496);
            color: white;
        }
        .btn-edit-student {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            color: white;
        }
        .btn-delete-student {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .cgpa-card {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .cgpa-card h2 { font-size: 48px; margin-bottom: 5px; }

        .semester-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .semester-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .semester-title { font-size: 18px; font-weight: 600; }
        .semester-gpa { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 14px; }
        .semester-content { padding: 20px; display: none; }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .subject-info { flex: 1; }
        .subject-name { font-weight: 600; color: #333; }
        .subject-marks { color: #666; font-size: 14px; margin-top: 3px; }
        .subject-gpa { font-weight: 700; color: #28a745; font-size: 18px; }
        .subject-actions { display: flex; gap: 8px; }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 16px;
        }
        .icon-btn.edit:hover { background: #ffc107; color: white; }
        .icon-btn.delete:hover { background: #dc3545; color: white; }

        .form-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #667eea; }

        .subject-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .subject-group input { flex: 1; }

        .no-result {
            text-align: center;
            padding: 40px;
            background: #fff3cd;
            border-radius: 15px;
            color: #856404;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .nav-links { justify-content: center; }
            .student-info { flex-direction: column; text-align: center; gap: 15px; }
            .subject-item { flex-direction: column; text-align: center; gap: 10px; }
            .admin-actions-bar { flex-direction: column; text-align: center; }
            .search-section { flex-direction: column; }
            .search-input, .btn-primary { width: 100%; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">MU</div>
            <div class="logo-text">
                <h1>Metropolitan University</h1>
                <p>Excel · Innovate · Lead</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="#">About</a>
            <a href="#">Academics</a>
            <a href="#">Admission</a>
            <div id="adminStatus"></div>
        </div>
    </nav>

    <div class="main-container">
        
        <div id="adminActionsBar" style="display: none;">
            <div class="admin-actions-bar">
                <span class="admin-actions-title"> Admin Control Panel</span>
                <div class="admin-actions-buttons">
                    <button class="admin-action-btn" onclick="showAddNewStudentForm()">Add New Student</button>
                </div>
            </div>
        </div>
        
       
        <div id="searchSection" class="glass-card" style="display: none;">
            <div class="search-section">
                <input type="text" id="search_student_id" class="search-input" placeholder="Enter Student ID to view results (e.g., 231-115-303)">
                <button class="btn-primary" onclick="searchStudentById()"> Load Student Results</button>
            </div>
        </div>
        
        <div id="output"></div>
    </div>

    <script>
        let currentStudent = null;
        let isAdmin = false;
        let currentStudentEmail = null;
        let currentViewingStudent = null;

        function getEmailFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('email');
        }

        function checkAdminStatus() {
            fetch("check_admin.php")
                .then(res => res.json())
                .then(data => {
                    if (data.admin) {
                        isAdmin = true;
                        document.getElementById("adminStatus").innerHTML = `
                            <span class="admin-badge"> Admin Panel</span>
                            <button onclick="adminLogout()" class="logout-btn">Logout</button>
                        `;
                        document.getElementById("adminActionsBar").style.display = "block";
                        document.getElementById("searchSection").style.display = "block";
                    } else {
                        isAdmin = false;
                        document.getElementById("adminStatus").innerHTML = `
                            <button onclick="showAdminLogin()" class="btn-primary" style="padding: 8px 20px;"> Admin Login</button>
                        `;
                        document.getElementById("adminActionsBar").style.display = "none";
                        document.getElementById("searchSection").style.display = "none";
                    }
                })
                .catch(error => console.error("Error:", error));
        }

        function showAdminLogin() {
            let html = `
                <div class="form-container" id="adminLoginForm">
                    <div class="form-title">Admin Login</div>
                    <div class="form-group"><label>Email</label><input type="email" id="admin_email" placeholder="admin@example.com"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="admin_pass" placeholder="Enter password"></div>
                    <button class="btn-primary" onclick="adminLogin()" style="width:100%">Login</button>
                    <button onclick="cancelAdminLogin()" style="width:100%; margin-top:10px; padding:12px; background:#6c757d; color:white; border:none; border-radius:10px; cursor:pointer;">Cancel</button>
                </div>
            `;
            document.getElementById("output").innerHTML = html;
        }

        function adminLogin() {
            let email = document.getElementById("admin_email").value;
            let password = document.getElementById("admin_pass").value;
            fetch("admin_login.php", {
                method: "POST",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            })
            .then(res => res.text())
            .then(data => {
                if (data === "success") {
                    showMessage("Admin login successful!", "success");
                    checkAdminStatus();
                    document.getElementById("studentInfoHeader").innerHTML = `<p style="color:black;"> Admin logged in. Search any student by ID.</p>`;
                    document.getElementById("output").innerHTML = "";
                } else {
                    showMessage("Invalid credentials!", "error");
                }
            });
        }

        function cancelAdminLogin() {
            document.getElementById("output").innerHTML = "";
            if (currentStudentEmail) {
                loadDataForEmail(currentStudentEmail);
            }
        }

        function adminLogout() {
            fetch("admin_logout.php").then(() => {
                isAdmin = false;
                checkAdminStatus();
                if (currentStudentEmail) {
                    loadDataForEmail(currentStudentEmail);
                }
                showMessage("Logged out successfully!", "success");
            });
        }

        function showMessage(msg, type) {
            let msgDiv = document.getElementById("message");
            msgDiv.innerHTML = msg;
            msgDiv.className = `message ${type}`;
            setTimeout(() => { msgDiv.style.display = "none"; msgDiv.className = "message"; }, 3000);
        }
        function searchStudentById() {
            let studentId = document.getElementById("search_student_id").value;
            if (!studentId) {
                showMessage("Please enter a Student ID!", "error");
                return;
            }

            fetch("get_student.php?id=" + encodeURIComponent(studentId))
                .then(res => res.json())
                .then(student => {
                    if (student.error || !student.id) {
                        document.getElementById("output").innerHTML = `<div class="no-result"> Student with ID ${studentId} not found!</div>`;
                        return;
                    }
                    currentViewingStudent = student;
                    return fetch("get_results.php?id=" + encodeURIComponent(student.id)).then(res => res.json()).then(results => ({ student, results }));
                })
                .then(data => {
                    if (!data) return;
                    let { student, results } = data;
                    renderAdminDashboard(student, results);
                    document.getElementById("studentInfoHeader").innerHTML = `<p style="color:black;"> Admin viewing: ${student.name} (${student.id})</p>`;
                })
                .catch(error => {
                    showMessage("Error loading data!", "error");
                });
        }

        function renderAdminDashboard(student, results) {
            let html = `
                <div class="student-info">
                    <div class="student-details">
                        <h3> ${student.name}</h3>
                        <p> ${student.email}</p>
                        <p>${student.department || 'Not specified'}</p>
                        <p> ID: ${student.id}</p>
                    </div>
                    <div class="student-actions">
                        <button class="action-btn btn-add-semester" onclick="showAddSemesterWithSubjectsForm('${student.id}')">Add Semester</button>
                        <button class="action-btn btn-edit-student" onclick="showEditStudentForm('${student.id}', '${student.name}')"> Edit</button>
                        <button class="action-btn btn-delete-student" onclick="deleteStudent('${student.id}')"> Delete</button>
                    </div>
                </div>
            `;

            if (results.results && Object.keys(results.results).length > 0) {
                html += `<div class="cgpa-card"><h2>CGPA: ${results.cgpa}</h2><p>Overall Academic Performance</p></div>`;
                for (let sem in results.results) {
                    let semesterGPA = calculateSemesterGPA(results.results[sem]);
                    html += `
                        <div class="semester-card">
                            <div class="semester-header" onclick="toggleSemester('sem_${sem.replace(/\s/g, '_')}')">
                                <span class="semester-title">${sem}</span>
                                <span class="semester-gpa">GPA: ${semesterGPA}</span>
                            </div>
                            <div id="sem_${sem.replace(/\s/g, '_')}" class="semester-content">`;
                    results.results[sem].forEach(r => {
                        html += `
                            <div class="subject-item">
                                <div class="subject-info">
                                    <div class="subject-name">${r.subject}</div>
                                    <div class="subject-marks">Marks: ${r.marks}</div>
                                </div>
                                <div class="subject-gpa">GPA: ${r.gpa}</div>
                                <div class="subject-actions">
                                    <button class="icon-btn edit" onclick="editSubject('${student.id}', '${sem}', '${r.subject}', ${r.marks}, ${r.gpa})">EDIT</button>
                                    <button class="icon-btn delete" onclick="deleteSubject('${student.id}', '${sem}', '${r.subject}')">DELETE</button>
                                </div>
                            </div>`;
                    });
                    html += `<button class="btn-primary" style="margin-top:15px; width:100%; background:linear-gradient(135deg,#28a745,#20c997);" onclick="showAddSubjectForm('${student.id}', '${sem}')">Add Subject to ${sem}</button>`;
                    html += `</div></div>`;
                }
            } else {
                html += `<div class="no-result">No results found for ${student.name}!<br><br><button class="btn-primary" onclick="showAddSemesterWithSubjectsForm('${student.id}')"> Add First Semester Results</button></div>`;
            }
            document.getElementById("output").innerHTML = html;
        }
        function loadDataForEmail(email) {
            currentStudentEmail = email;
            if (!email) {
                document.getElementById("output").innerHTML = "<div class='no-result'>No email found. Please login again.</div>";
                return;
            }

            fetch("get_student_by_email.php?email=" + encodeURIComponent(email))
                .then(res => res.json())
                .then(student => {
                    if (student.error || !student.id) {
                        let html = `<div class="no-result">Student with email ${email} not found!`;
                        if (isAdmin) {
                            html += `<br><br><button class="btn-primary" onclick="showAddNewStudentForm()"> Register New Student</button>`;
                        }
                        html += `</div>`;
                        document.getElementById("output").innerHTML = html;
                        document.getElementById("studentInfoHeader").innerHTML = `<p style="color:black;"> Logged in as: ${email}</p>`;
                        return;
                    }
                    currentStudent = student;
                    return fetch("get_results.php?id=" + encodeURIComponent(student.id)).then(res => res.json()).then(results => ({ student, results }));
                })
                .then(data => {
                    if (!data) return;
                    let { student, results } = data;
                    renderStudentDashboard(student, results);
                    document.getElementById("studentInfoHeader").innerHTML = `<p style="color:white;"> Welcome, ${student.name} (${student.email})</p>`;
                })
                .catch(error => { showMessage("Error loading data!", "error"); });
        }

        function renderStudentDashboard(student, results) {
            let html = `
                <div class="student-info">
                    <div class="student-details">
                        <h3>${student.name}</h3>
                        <p>${student.email}</p>
                        <p> ${student.department || 'Not specified'}</p>
                        <p> ID: ${student.id}</p>
                    </div>
                </div>
            `;

            if (results.results && Object.keys(results.results).length > 0) {
                html += `<div class="cgpa-card"><h2> CGPA: ${results.cgpa}</h2><p>Overall Academic Performance</p></div>`;
                for (let sem in results.results) {
                    let semesterGPA = calculateSemesterGPA(results.results[sem]);
                    html += `
                        <div class="semester-card">
                            <div class="semester-header" onclick="toggleSemester('sem_${sem.replace(/\s/g, '_')}')">
                                <span class="semester-title">${sem}</span>
                                <span class="semester-gpa">GPA: ${semesterGPA}</span>
                            </div>
                            <div id="sem_${sem.replace(/\s/g, '_')}" class="semester-content">`;
                    results.results[sem].forEach(r => {
                        html += `
                            <div class="subject-item">
                                <div class="subject-info">
                                    <div class="subject-name">${r.subject}</div>
                                    <div class="subject-marks">Marks: ${r.marks}</div>
                                </div>
                                <div class="subject-gpa">GPA: ${r.gpa}</div>
                            </div>`;
                    });
                    html += `</div></div>`;
                }
            } else {
                html += `<div class="no-result">📭 No results found for ${student.name}!<br><br>please contact admin to add results.</div>`;
            }
            document.getElementById("output").innerHTML = html;
        }

        function calculateSemesterGPA(subjects) {
            let total = 0, count = 0;
            subjects.forEach(s => { if (s.gpa) { total += parseFloat(s.gpa); count++; } });
            return count > 0 ? (total / count).toFixed(2) : 0;
        }

        function calculateGPA(marks) {
            if (marks >= 80) return 4.00;
            if (marks >= 75) return 3.75;
            if (marks >= 70) return 3.50;
            if (marks >= 65) return 3.25;
            if (marks >= 60) return 3.00;
            if (marks >= 55) return 2.75;
            if (marks >= 50) return 2.50;
            if (marks >= 45) return 2.25;
            if (marks >= 40) return 2.00;
            return 0.00;
        }

        function toggleSemester(id) {
            let el = document.getElementById(id);
            el.style.display = el.style.display === "none" || el.style.display === "" ? "block" : "none";
        }

        function showAddNewStudentForm() {
            if (!isAdmin) {
                alert("Admin login required!");
                showAdminLogin();
                return;
            }
            
            let html = `
                <div class="form-container" id="addNewStudentForm">
                    <div class="form-title">Register New Student</div>
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="new_student_id" placeholder="e.g., 231-115-303">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="new_student_name" placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="new_student_email" placeholder="student@example.com">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="new_student_dept" placeholder="e.g., CSE, BBA, EEE">
                    </div>
                    <button class="btn-primary" onclick="saveNewStudentFromDashboard()" style="width:100%">Save Student</button>
                    <button onclick="cancelAddStudentForm()" style="width:100%; margin-top:10px; padding:12px; background:#6c757d; color:white; border:none; border-radius:10px; cursor:pointer;"> Cancel</button>
                </div>
            `;
            document.getElementById("output").innerHTML = html;
        }

        function cancelAddStudentForm() {
            document.getElementById("output").innerHTML = "";
            document.getElementById("search_student_id").value = "";
        }

        function saveNewStudentFromDashboard() {
            let id = document.getElementById("new_student_id").value;
            let name = document.getElementById("new_student_name").value;
            let email = document.getElementById("new_student_email").value;
            let dept = document.getElementById("new_student_dept").value;
            
            if (!id || !name || !email) {
                alert("Please fill all required fields (ID, Name, Email)!");
                return;
            }
            
            fetch("add_student.php", {
                method: "POST",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&department=${encodeURIComponent(dept)}`
            })
            .then(res => res.text())
            .then(data => {
                if (data === "Added") {
                    alert("Student registered successfully!");
                    cancelAddStudentForm();
                } else {
                    alert(" Error: " + data);
                }
            });
        }
        function showAddSemesterWithSubjectsForm(studentId) {
            let html = `
                <div class="form-container" id="addSemesterForm">
                    <div class="form-title">Add New Semester</div>
                    <div class="form-group">
                        <label>Select Semester</label>
                        <select id="semester_select">
                            <option>Spring 2025</option><option>Fall 2025</option>
                            <option>Spring 2026</option><option>Fall 2026</option>
                            <option>Spring 2027</option>
                        </select>
                    </div>
                    <div class="form-title" style="margin-top:20px;">Subjects</div>
                    <div id="subjects_container">
                        <div class="subject-group">
                            <input type="text" placeholder="Subject Name" class="sub_name">
                            <input type="number" placeholder="Marks" class="sub_marks" min="0" max="100">
                            <input type="text" placeholder="GPA (auto)" class="sub_gpa" readonly>
                        </div>
                    </div>
                    <button onclick="addSubjectField()" style="background:#6c757d; color:white; border:none; padding:10px; border-radius:8px; margin-bottom:15px; cursor:pointer;"> Add Another Subject</button>
                    <button class="btn-primary" onclick="saveAllSubjects('${studentId}')" style="width:100%"> Save All Subjects</button>
                    <button onclick="cancelForm()" style="width:100%; margin-top:10px; padding:12px; background:#6c757d; color:white; border:none; border-radius:10px; cursor:pointer;">Cancel</button>
                </div>
            `;
            document.getElementById("output").innerHTML = html;
            attachGPACalc();
        }

        function addSubjectField() {
            let container = document.getElementById("subjects_container");
            let div = document.createElement("div");
            div.className = "subject-group";
            div.innerHTML = `
                <input type="text" placeholder="Subject Name" class="sub_name">
                <input type="number" placeholder="Marks" class="sub_marks" min="0" max="100">
                <input type="text" placeholder="GPA (auto)" class="sub_gpa" readonly>
                <button onclick="this.parentElement.remove()" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;"> Remove</button>
            `;
            container.appendChild(div);
            attachGPACalc();
        }

        function attachGPACalc() {
            setTimeout(() => {
                document.querySelectorAll(".sub_marks").forEach(input => {
                    input.removeEventListener('input', calculateFieldGPA);
                    input.addEventListener('input', calculateFieldGPA);
                });
            }, 100);
        }

        function calculateFieldGPA(e) {
            let marks = parseFloat(e.target.value);
            let gpa = calculateGPA(marks);
            let parent = e.target.parentElement;
            let gpaInput = parent.querySelector(".sub_gpa");
            if (gpaInput && !isNaN(gpa)) gpaInput.value = gpa.toFixed(2);
        }

        function saveAllSubjects(studentId) {
            let semester = document.getElementById("semester_select").value;
            let groups = document.querySelectorAll(".subject-group");
            let subjects = [];
            groups.forEach(g => {
                let name = g.querySelector(".sub_name").value;
                let marks = g.querySelector(".sub_marks").value;
                let gpa = g.querySelector(".sub_gpa").value;
                if (name && marks) subjects.push({ name, marks, gpa });
            });
            if (subjects.length === 0) { alert("Add at least one subject!"); return; }
            
            let promises = subjects.map(s => fetch("add_result.php", {
                method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `student_id=${studentId}&semester=${semester}&subject=${s.name}&marks=${s.marks}&gpa=${s.gpa || calculateGPA(s.marks)}`
            }));
            Promise.all(promises).then(() => { alert("Subjects added!"); cancelForm(); searchStudentById(); });
        }

        function showAddSubjectForm(studentId, semester) {
            let html = `
                <div class="form-container" id="addSubjectForm">
                    <div class="form-title">Add Subject for ${semester}</div>
                    <div class="form-group"><label>Subject Name</label><input type="text" id="sub_name"></div>
                    <div class="form-group"><label>Marks (0-100)</label><input type="number" id="sub_marks" min="0" max="100"></div>
                    <div class="form-group"><label>GPA (Auto)</label><input type="text" id="sub_gpa" readonly></div>
                    <button class="btn-primary" onclick="saveSingleSubject('${studentId}', '${semester}')" style="width:100%">Save</button>
                    <button onclick="cancelForm()" style="width:100%; margin-top:10px; padding:12px; background:#6c757d; color:white; border:none; border-radius:10px; cursor:pointer;">Cancel</button>
                </div>
            `;
            document.getElementById("output").innerHTML = html;
            document.getElementById("sub_marks").addEventListener('input', function() {
                document.getElementById("sub_gpa").value = calculateGPA(parseFloat(this.value)).toFixed(2);
            });
        }

        function saveSingleSubject(studentId, semester) {
            let name = document.getElementById("sub_name").value;
            let marks = document.getElementById("sub_marks").value;
            let gpa = document.getElementById("sub_gpa").value;
            if (!name || !marks) { alert("Fill all fields!"); return; }
            fetch("add_result.php", {
                method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `student_id=${studentId}&semester=${semester}&subject=${name}&marks=${marks}&gpa=${gpa}`
            }).then(() => { alert("Subject added!"); cancelForm(); searchStudentById(); });
        }

        function editSubject(studentId, semester, subject, marks, gpa) {
            let html = `
                <div class="form-container" id="editForm">
                    <div class="form-title">Edit ${subject}</div>
                    <div class="form-group">
                        <label>Marks (0-100)</label>
                        <input type="number" id="edit_marks" value="${marks}" min="0" max="100" step="1">
                        <small style="color: #28a745; display: block; margin-top: 5px;">GPA will update automatically when you change marks</small>
                    </div>
                    <div class="form-group">
                        <label>GPA (Auto-calculated)</label>
                        <input type="text" id="edit_gpa" value="${gpa}" readonly style="background:#f0f0f0; font-weight: bold; color: #28a745;">
                    </div>
                    <button class="btn-primary" onclick="updateSubject('${studentId}', '${semester}', '${subject}')" style="width:100%">Update</button>
                    <button onclick="cancelForm()" style="width:100%; margin-top:10px; padding:12px; background:#6c757d; color:white; border:none; border-radius:10px; cursor:pointer;"> Cancel</button>
                </div>
            `;
            document.getElementById("output").innerHTML = html;
            
            let marksInput = document.getElementById("edit_marks");
            let gpaInput = document.getElementById("edit_gpa");
            
            marksInput.addEventListener('input', function() {
                let newMarks = parseFloat(this.value);
                let newGpa = calculateGPA(newMarks);
                if (!isNaN(newGpa)) {
                    gpaInput.value = newGpa.toFixed(2);
                    gpaInput.style.backgroundColor = "#d4edda";
                    setTimeout(() => { gpaInput.style.backgroundColor = "#f0f0f0"; }, 300);
                } else {
                    gpaInput.value = '';
                }
            });
        }

        function updateSubject(studentId, semester, subject) {
            let marks = document.getElementById("edit_marks").value;
            let gpa = document.getElementById("edit_gpa").value;
            
            if (!marks) {
                alert(" Please enter marks!");
                return;
            }
            
            if (!gpa || gpa === '') {
                gpa = calculateGPA(parseFloat(marks));
            }
            
            fetch("add_result.php", {
                method: "POST", 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `student_id=${studentId}&semester=${semester}&subject=${subject}&marks=${marks}&gpa=${gpa}`
            }).then(res => res.text())
            .then(data => {
                alert(" " + data);
                cancelForm(); 
                searchStudentById();
            });
        }

        function deleteSubject(studentId, semester, subject) {
            if (confirm("Delete this subject?")) {
                fetch("delete_result.php", {
                    method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `student_id=${studentId}&semester=${semester}&subject=${subject}`
                }).then(() => searchStudentById());
            }
        }

        function deleteStudent(studentId) {
            if (confirm("Delete this student and all results?")) {
                fetch("delete_student.php", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `id=${studentId}` })
                    .then(() => { 
                        alert("Student deleted successfully!");
                        document.getElementById("search_student_id").value = "";
                        document.getElementById("output").innerHTML = "";
                        document.getElementById("studentInfoHeader").innerHTML = `<p style="color:black;">Admin logged in. Search any student by ID.</p>`;
                    });
            }
        }

        function showEditStudentForm(studentId, studentName) {
            let html = `
                <div class="form-container">
                    <div class="form-title">Edit Student</div>
                    <div class="form-group"><label>Name</label><input type="text" id="edit_name" value="${studentName}"></div>
                    <button class="btn-primary" onclick="updateStudent('${studentId}')">Update</button>
                    <button onclick="cancelForm()" style="width:100%; margin-top:10px; padding:12px; background:#6c757d;">Cancel</button>
                </div>
            `;
            document.getElementById("output").innerHTML = html;
        }

        function updateStudent(studentId) {
            let name = document.getElementById("edit_name").value;
            fetch("update_student.php", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `id=${studentId}&name=${name}` })
                .then(() => { alert("Student updated!"); cancelForm(); searchStudentById(); });
        }

        function cancelForm() {
            if (isAdmin) {
                document.getElementById("output").innerHTML = "";
                document.getElementById("search_student_id").value = "";
            } else {
                loadDataForEmail(currentStudentEmail);
            }
        }
        currentStudentEmail = getEmailFromURL();
        checkAdminStatus();
        if (currentStudentEmail && !isAdmin) {
            loadDataForEmail(currentStudentEmail);
        } else if (isAdmin) {
            document.getElementById("studentInfoHeader").innerHTML = `<p style="color:black;">Admin logged in. Search any student by ID.</p>`;
        } else {
            document.getElementById("output").innerHTML = "<div class='no-result'>No email found. Please login from <a href='./index.html' style='color:#667eea;'>here</a></div>";
        }
    </script>
</body>

</html>
