<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropolitan University - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') center/cover no-repeat;
            opacity: 0.15;
            z-index: -1;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text h1 {
            font-size: 20px;
            color: #333;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 12px;
            color: #666;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .student-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white !important;
            padding: 8px 20px;
            border-radius: 25px;
        }

        .main-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .shield-icon span {
            font-size: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
            background: #f8f9fa;
        }

        .input-group input:focus {
            border-color: #667eea;
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
            }
            .login-card {
                margin: 20px;
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">MU</div>
            <div class="logo-text">
                <h1>Metropolitan University</h1>
                <p>Excel · Innovate · Lead</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="./index.html">🏠 Home</a>
            <a href="#">📖 About</a>
            <a href="#">🎓 Academics</a>
            <a href="#">📝 Admission</a>
            <a href="./index.html" class="student-btn">👨‍🎓 Student Login</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="login-card">
            <div class="login-header">
                <div class="shield-icon">
                    <span>🛡️</span>
                </div>
                <h2>Admin Portal</h2>
                <p>Access the administrative dashboard</p>
            </div>

            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="admin_email" placeholder="admin@example.com">
            </div>

            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="admin_pass" placeholder="Enter your password">
            </div>

            <button class="login-btn" onclick="adminLogin()" id="loginBtn">
                🔓 Login to Dashboard
            </button>

            <div id="message" class="message"></div>

            <div class="login-footer">
                <a href="./index.html">← Back to Student Login</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 Metropolitan University | All Rights Reserved</p>
    </div>

    <script>
        // Check if admin already logged in
        function checkAdminSession() {
            fetch("check_auth.php")
                .then(res => res.json())
                .then(data => {
                    if (data.admin_logged_in) {
                        window.location.href = "dashboard.html";
                    }
                })
                .catch(error => console.error("Error:", error));
        }

        function adminLogin() {
            let email = document.getElementById("admin_email").value;
            let password = document.getElementById("admin_pass").value;
            let btn = document.getElementById("loginBtn");
            let msgDiv = document.getElementById("message");
            
            if (!email || !password) {
                msgDiv.innerHTML = "⚠️ Please enter both email and password";
                msgDiv.className = "message error";
                return;
            }
            
            btn.innerHTML = "⏳ Authenticating...";
            btn.disabled = true;
            
            fetch("admin_login.php", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: "email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password)
            })
            .then(response => response.text())
            .then(data => {
                if (data === "success") {
                    msgDiv.innerHTML = "✅ Login successful! Redirecting...";
                    msgDiv.className = "message success";
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    msgDiv.innerHTML = "❌ Login failed: " + data;
                    msgDiv.className = "message error";
                    btn.innerHTML = "🔓 Login to Dashboard";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                msgDiv.innerHTML = "❌ Connection error. Please try again.";
                msgDiv.className = "message error";
                btn.innerHTML = "🔓 Login to Dashboard";
                btn.disabled = false;
            });
        }

        // Enter key support
        document.getElementById("admin_pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                adminLogin();
            }
        });

        // Check session on page load
        checkAdminSession();
    </script>
</body>
</html>
