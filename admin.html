<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <script src="script.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        input, button { margin: 10px; padding: 8px; }
        button { cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Login</h2>
        <input type="email" id="admin_email" placeholder="Email" style="width: 90%;">
        <br>
        <input type="password" id="admin_pass" placeholder="Password" style="width: 90%;">
        <br>
        <button onclick="adminLogin()">Login</button>
    </div>
</body>
</html>
