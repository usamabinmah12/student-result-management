<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        input, button { margin: 10px; padding: 8px; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Login</h2>
        <input type="email" id="admin_email" placeholder="Email" style="width: 90%;">
        <br>
        <input type="password" id="admin_pass" placeholder="Password" style="width: 90%;">
        <br>
        <button onclick="adminLogin()">Login</button>
        <div id="message" class="error"></div>
    </div>

    <script>
    function adminLogin() {
        let email = document.getElementById("admin_email").value;
        let password = document.getElementById("admin_pass").value;
        
        if (!email || !password) {
            document.getElementById("message").innerHTML = "Please enter both email and password";
            return;
        }
        
        fetch("admin_login.php", {
            method: "POST",
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: "email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password)
        })
        .then(response => response.text())
        .then(data => {
            console.log("Response:", data);
            if (data === "success") {
                alert("Login successful!");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("message").innerHTML = "Login failed: " + data;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            document.getElementById("message").innerHTML = "Error: " + error.message;
        });
    }
    </script>
</body>
</html>
